name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Create supabase_config.dart
        run: |
          mkdir -p lib/core/config
          cat > lib/core/config/supabase_config.dart << 'EOF'
          class SupabaseConfig {
            SupabaseConfig._();
            static const String url     = '${{ secrets.SUPABASE_URL }}';
            static const String anonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | grep -v -- "-----" | base64 --decode > android/app/keystore.jks

      - name: Build release APK
        env:
          STORE_FILE: ${{ github.workspace }}/android/app/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Get version from pubspec
        id: ver
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/hoczita-v${{ steps.ver.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-b${{ github.run_number }}
          name: "HocZiTa v${{ steps.ver.outputs.version }} (build ${{ github.run_number }})"
          body: |
            ### Thay đổi
            Commit: `${{ github.sha }}`

            ### Tải về
            Nhấn vào file `.apk` bên dưới để tải.
          files: build/app/outputs/flutter-apk/hoczita-v${{ steps.ver.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
